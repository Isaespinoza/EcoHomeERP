<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#a87f3e">
<title>DreamRest</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:14px;background:#f5f5f4;color:#1c1917;padding-bottom:60px}
.app{max-width:900px;margin:0 auto;background:#fff;min-height:100vh}
.hdr{background:linear-gradient(135deg,#a87f3e 0%,#c89958 100%);color:#fff;padding:18px 16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.logo{font-size:22px;font-weight:300;letter-spacing:.5px}
.logo b{font-weight:600}
.subtitle{font-size:11px;opacity:.85;margin-top:2px}
.nav{display:flex;background:#fff;border-bottom:1px solid #e7e5e4;position:sticky;top:71px;z-index:99}
.nav-btn{flex:1;padding:14px 8px;background:none;border:none;font-size:13px;color:#78716c;cursor:pointer;border-bottom:3px solid transparent;font-weight:500}
.nav-btn.active{color:#a87f3e;border-bottom-color:#a87f3e;background:#fefdf9}
.section{display:none;padding:14px}
.section.active{display:block}
.toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.btn{background:#a87f3e;color:#fff;border:none;padding:10px 16px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:500;transition:background .2s}
.btn:hover{background:#8b6831}
.btn-sec{background:#fff;color:#a87f3e;border:1px solid #a87f3e}
.btn-sec:hover{background:#fef9f0}
.btn-danger{background:#dc2626}
.btn-danger:hover{background:#b91c1c}
.btn-sm{padding:6px 10px;font-size:11px}
input,select,textarea{font-family:inherit;font-size:14px;padding:9px 11px;border:1px solid #d6d3d1;border-radius:8px;background:#fff;width:100%;color:#1c1917}
input:focus,select:focus,textarea:focus{outline:none;border-color:#a87f3e}
label{display:block;font-size:11px;color:#57534e;margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.05em}
.field{margin-bottom:10px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.card{background:#fff;border:1px solid #e7e5e4;border-radius:10px;padding:14px;margin-bottom:10px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.card h4{font-size:14px;font-weight:600;margin-bottom:6px}
.tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500;margin-right:4px}
.tag-may{background:#fef3c7;color:#92400e}
.tag-min{background:#dbeafe;color:#1e40af}
.tag-stock-ok{background:#dcfce7;color:#166534}
.tag-stock-low{background:#fed7aa;color:#9a3412}
.tag-stock-out{background:#fee2e2;color:#991b1b}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px}
.stat{background:#fff;border:1px solid #e7e5e4;border-radius:10px;padding:14px}
.stat-lbl{font-size:10px;color:#78716c;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;font-weight:600}
.stat-val{font-size:20px;font-weight:600;color:#1c1917}
.stat-val.may{color:#a87f3e}
.stat-val.min{color:#1e40af}
.stat-val.warn{color:#dc2626}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 6px;font-size:11px;color:#78716c;font-weight:600;border-bottom:1px solid #e7e5e4;text-transform:uppercase;letter-spacing:.03em;white-space:nowrap}
td{padding:8px 6px;border-bottom:1px solid #f5f5f4}
tbody tr:hover{background:#fafaf9}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;padding:20px;align-items:flex-start;justify-content:center;overflow-y:auto}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:12px;padding:18px;width:100%;max-width:550px;margin-top:20px}
.modal h3{font-size:16px;margin-bottom:12px;color:#a87f3e}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;flex-wrap:wrap}
.bar{height:8px;background:#e7e5e4;border-radius:99px;overflow:hidden;margin-top:4px}
.bar-fill{height:100%;background:#a87f3e;border-radius:99px}
.bar-row{margin-bottom:8px}
.bar-lbl{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
.empty{text-align:center;padding:30px 14px;color:#78716c;font-size:13px}
.search{position:relative;margin-bottom:10px}
.search input{padding-left:34px}
.search::before{content:"🔍";position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:14px;opacity:.5}
.fil{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.fil select{flex:1;min-width:120px}
.item-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f5f5f4;font-size:12px}
.item-row:last-child{border:none}
.danger{color:#dc2626}
.warn{color:#d97706}
.ok{color:#059669}
.muted{color:#78716c}
.pill{display:inline-block;background:#f5f5f4;padding:2px 8px;border-radius:99px;font-size:10px;color:#57534e}
.add-item-row{display:grid;grid-template-columns:2fr 60px 100px 30px;gap:6px;align-items:center;margin-bottom:6px}
@media(max-width:500px){
  .row,.row3{grid-template-columns:1fr}
  .add-item-row{grid-template-columns:1fr 60px 100px 30px}
  th,td{padding:6px 4px;font-size:11px}
  .stat-grid{grid-template-columns:1fr 1fr}
}
.fab{position:fixed;bottom:20px;right:20px;width:54px;height:54px;border-radius:50%;background:#a87f3e;color:#fff;border:none;font-size:26px;cursor:pointer;box-shadow:0 4px 12px rgba(168,127,62,.4);z-index:50}
.help{font-size:11px;color:#78716c;background:#fef9f0;padding:8px 10px;border-radius:6px;border-left:3px solid #a87f3e;margin-bottom:10px}
.confirm-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;padding:12px;border-top:1px solid #e7e5e4;display:none;justify-content:space-between;align-items:center;z-index:200;box-shadow:0 -2px 8px rgba(0,0,0,.05)}
.confirm-bar.show{display:flex}
</style>
</head>
<body>
<div class="app">
  <div id="loading" style="display:none;position:fixed;inset:0;background:rgba(255,255,255,.9);z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:12px">
    <div style="width:40px;height:40px;border:4px solid #e7e5e4;border-top-color:#a87f3e;border-radius:50%;animation:spin 0.8s linear infinite"></div>
    <div style="font-size:13px;color:#78716c">Conectando con Firebase...</div>
  </div>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
  <div class="hdr">
    <div class="logo">Dream<b>Rest</b></div>
    <div class="subtitle">Sistema de gestión · Rivas 590, San Joaquín</div>
  </div>

  <div class="nav">
    <button class="nav-btn active" onclick="setTab('inventario')">📦 Inv.</button>
    <button class="nav-btn" onclick="setTab('ventas')">🛒 Ventas</button>
    <button class="nav-btn" onclick="setTab('despachos')">🚚 Despachos</button>
    <button class="nav-btn" onclick="setTab('resumen')">📊 Resumen</button>
  </div>

  <!-- INVENTARIO -->
  <div id="tab-inventario" class="section active">
    <div class="search"><input type="text" id="inv-search" placeholder="Buscar producto..." oninput="renderInv()"></div>
    <div class="fil">
      <select id="inv-marca" onchange="renderInv()"><option value="">Todas las marcas</option></select>
      <select id="inv-cat" onchange="renderInv()"><option value="">Todas las categorías</option></select>
    </div>
    <div class="toolbar">
      <button class="btn btn-sm" onclick="openProd()">+ Agregar producto</button>
      <button class="btn btn-sec btn-sm" onclick="exportInv()">📥 Exportar</button>
    </div>
    <div id="inv-stats" class="stat-grid"></div>
    <div id="inv-list"></div>
  </div>

  <!-- VENTAS -->
  <div id="tab-ventas" class="section">
    <div class="toolbar">
      <button class="btn" onclick="openVenta()">+ Nueva venta</button>
      <button class="btn btn-sec btn-sm" onclick="exportVentas()">📥 Exportar</button>
    </div>
    <div class="fil">
      <input type="text" id="v-search" placeholder="Buscar cliente..." oninput="renderVentas()" style="flex:2;min-width:140px">
      <select id="v-tipo" onchange="renderVentas()">
        <option value="">Todos</option>
        <option value="min">Minorista</option>
        <option value="may">Mayorista</option>
      </select>
    </div>
    <div class="fil" style="align-items:center;gap:6px">
      <div style="display:flex;align-items:center;gap:4px;flex:1;min-width:120px">
        <label style="margin:0;white-space:nowrap;font-size:10px;color:#78716c;text-transform:uppercase;letter-spacing:.05em">Desde</label>
        <input type="date" id="v-desde" onchange="renderVentas()" style="flex:1">
      </div>
      <div style="display:flex;align-items:center;gap:4px;flex:1;min-width:120px">
        <label style="margin:0;white-space:nowrap;font-size:10px;color:#78716c;text-transform:uppercase;letter-spacing:.05em">Hasta</label>
        <input type="date" id="v-hasta" onchange="renderVentas()" style="flex:1">
      </div>
      <select id="v-vendedor" onchange="renderVentas()" style="flex:1;min-width:100px">
        <option value="">Vendedor</option>
        <option>Isaías</option>
        <option>Daniela</option>
      </select>
      <select id="v-pago" onchange="renderVentas()" style="flex:1;min-width:110px">
        <option value="">Forma de pago</option>
        <option>Efectivo</option>
        <option>Tarjeta</option>
        <option>Transferencia</option>
        <option>Débito</option>
        <option>Crédito</option>
        <option>Mixto</option>
      </select>
      <select id="v-estado" onchange="renderVentas()" style="flex:1;min-width:110px">
        <option value="">Estado</option>
        <option value="pendiente">🟡 Pendiente</option>
        <option value="pagado">🟠 Pagado</option>
        <option value="despachado">🟢 Despachado</option>
        <option value="cancelado">🔴 Cancelado</option>
      </select>
      <button class="btn btn-sec btn-sm" onclick="limpiarFiltrosVentas()" style="white-space:nowrap">✕ Limpiar</button>
    </div>
    <div id="v-stats" class="stat-grid"></div>
    <div id="v-list"></div>
  </div>

  <!-- DESPACHOS -->
  <div id="tab-despachos" class="section">
    <div class="fil" style="align-items:center;gap:6px">
      <select id="d-estado" onchange="renderDespachos()" style="flex:1;min-width:130px">
        <option value="">Todos los estados</option>
        <option value="pendiente">🟡 Pendiente</option>
        <option value="pagado">🟠 Pagado</option>
        <option value="despachado">🟢 Despachado</option>
      </select>
      <div style="display:flex;align-items:center;gap:4px;flex:1;min-width:120px">
        <label style="margin:0;white-space:nowrap;font-size:10px;color:#78716c;text-transform:uppercase;letter-spacing:.05em">Fecha</label>
        <input type="date" id="d-fecha" onchange="renderDespachos()" style="flex:1">
      </div>
      <button class="btn btn-sec btn-sm" onclick="document.getElementById('d-estado').value='';document.getElementById('d-fecha').value='';renderDespachos()">✕ Limpiar</button>
    </div>
    <div id="d-list" style="margin-top:10px"></div>
  </div>

  <!-- RESUMEN -->
  <div id="tab-resumen" class="section">
    <div class="fil">
      <select id="r-mes" onchange="renderResumen()"></select>
      <select id="r-anio" onchange="renderResumen()"></select>
    </div>
    <div id="r-stats" class="stat-grid"></div>
    <div id="r-charts"></div>
    <div id="r-tabla"></div>
  </div>
</div>

<!-- Modal Producto -->
<div class="modal-bg" id="modal-prod">
  <div class="modal">
    <h3 id="prod-title">Agregar producto</h3>
    <div class="field"><label>Nombre</label><input type="text" id="p-nombre"></div>
    <div class="row">
      <div class="field"><label>Marca</label><input type="text" id="p-marca" list="marca-list"></div>
      <div class="field"><label>Categoría</label><select id="p-cat">
        <option>Colchón</option><option>Cama Europea</option><option>Cama Baúl</option>
        <option>Base</option><option>Almohada</option><option>Plumón</option>
        <option>Velador</option><option>Respaldo</option><option>Otro</option>
      </select></div>
    </div>
    <datalist id="marca-list"></datalist>
    <div class="row">
      <div class="field"><label>Precio mayorista</label><input type="number" id="p-may"></div>
      <div class="field"><label>Precio minorista</label><input type="number" id="p-min"></div>
    </div>
    <div class="row">
      <div class="field"><label>Stock</label><input type="number" id="p-stock" value="0"></div>
      <div class="field"><label>Stock mínimo (alerta)</label><input type="number" id="p-min-stock" value="2"></div>
    </div>
    <div class="field"><label>Notas (opcional)</label><input type="text" id="p-notas" placeholder="Ej: 1 en exhibición, fabricación propia"></div>
    <div class="modal-actions">
      <button class="btn btn-sec btn-sm" onclick="closeModal('modal-prod')">Cancelar</button>
      <button class="btn btn-danger btn-sm" id="del-prod-btn" onclick="delProd()" style="display:none">Eliminar</button>
      <button class="btn btn-sm" onclick="saveProd()">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal Venta -->
<div class="modal-bg" id="modal-venta">
  <div class="modal" style="max-width:600px">
    <h3 id="venta-title">Nueva venta</h3>
    <div class="row">
      <div class="field"><label>Fecha de venta</label><input type="date" id="vt-fecha"></div>
      <div class="field"><label>Tipo</label><select id="vt-tipo" onchange="updTipoVenta()">
        <option value="min">Minorista</option><option value="may">Mayorista</option>
      </select></div>
    </div>
    <div class="row">
      <div class="field"><label>Estado</label><select id="vt-estado">
        <option value="pendiente">🟡 Pendiente</option>
        <option value="pagado">🟠 Pagado</option>
        <option value="despachado">🟢 Despachado</option>
        <option value="cancelado">🔴 Cancelado</option>
      </select></div>
      <div class="field" id="vt-fecha-desp-wrap"><label>Fecha despacho <button type="button" onclick="sincFechaDesp()" style="font-size:10px;padding:2px 6px;background:#fef9f0;color:#a87f3e;border:1px solid #a87f3e;border-radius:4px;cursor:pointer;margin-left:4px">= hoy</button></label><input type="date" id="vt-fecha-desp"></div>
    </div>
    <div class="field"><label>Cliente</label><input type="text" id="vt-cliente"></div>
    <div class="row" id="vt-rut-row" style="display:none">
      <div class="field"><label>RUT</label><input type="text" id="vt-rut" placeholder="12.345.678-9"></div>
      <div class="field"><label>Empresa/Local</label><input type="text" id="vt-empresa"></div>
    </div>
    <div class="row">
      <div class="field"><label>Teléfono</label>
        <div style="display:flex;align-items:center;gap:6px">
          <span style="background:#f5f5f4;padding:9px 11px;border:1px solid #d6d3d1;border-radius:8px;font-size:14px;color:#57534e;white-space:nowrap">+56 9</span>
          <input type="tel" id="vt-tel" placeholder="1234 5678" maxlength="10" style="flex:1">
        </div>
      </div>
      <div class="field"><label>Vendedor</label><select id="vt-vendedor">
        <option>Isaías</option><option>Daniela</option>
      </select></div>
    </div>
    <div class="field"><label>Dirección (opcional)</label><input type="text" id="vt-dir"></div>
    <div class="row">
      <div class="field"><label>Forma de pago</label><select id="vt-pago">
        <option>Efectivo</option><option>Tarjeta</option><option>Transferencia</option>
        <option>Débito</option><option>Crédito</option><option>Mixto</option>
      </select></div>
      <div class="field"><label>Despacho ($)</label><input type="number" id="vt-desp" value="0" placeholder="0 si retira" oninput="toggleDespCampos()"></div>
    </div>

    <!-- Campos de despacho - solo aparecen si hay despacho -->
    <div id="vt-desp-campos" style="display:none;background:#fef9f0;padding:10px;border-radius:8px;margin-bottom:10px">
      <div style="font-size:11px;color:#a87f3e;font-weight:600;margin-bottom:8px;text-transform:uppercase">📍 Datos de despacho</div>
      <div class="field"><label>Calle</label><input type="text" id="vt-calle" placeholder="Ej: Av. Providencia"></div>
      <div class="row">
        <div class="field"><label>N° Casa / Depto</label><input type="text" id="vt-numero" placeholder="Ej: 1234, Depto 501"></div>
        <div class="field"><label>Comuna</label><input type="text" id="vt-comuna" placeholder="Ej: Providencia"></div>
      </div>
      <div class="row">
        <div class="field"><label>Hora estimada de entrega</label>
          <select id="vt-hora">
            <option value="Sin preferencia">Sin preferencia</option>
            <option value="Mañana (9:00 - 12:00)">Mañana (9:00 - 12:00)</option>
            <option value="Mediodía (12:00 - 15:00)">Mediodía (12:00 - 15:00)</option>
            <option value="Tarde (15:00 - 18:00)">Tarde (15:00 - 18:00)</option>
            <option value="Noche (18:00 - 21:00)">Noche (18:00 - 21:00)</option>
            <option value="Coordinar con cliente">Coordinar con cliente</option>
          </select>
        </div>
      </div>
    </div>

    <div style="margin:14px 0 6px"><strong style="font-size:13px">Productos</strong></div>
    <div id="vt-items"></div>
    <button class="btn btn-sec btn-sm" onclick="addItem()" style="margin-top:6px">+ Agregar producto</button>

    <div style="margin-top:12px">
      <div class="row">
        <div class="field"><label>Monto cancelado</label><input type="number" id="vt-cancelado" placeholder="Lo que pagó el cliente"></div>
        <div class="field"><label>Saldo pendiente</label><input type="number" id="vt-saldo" readonly style="background:#f5f5f4"></div>
      </div>
    </div>

    <div class="field"><label>Notas</label><textarea id="vt-notas" rows="2" placeholder="Despacho por pagar, retira en tienda, etc."></textarea></div>

    <div style="background:#fef9f0;padding:10px;border-radius:8px;margin-top:8px">
      <div style="display:flex;justify-content:space-between"><span class="muted">Subtotal productos:</span><strong id="vt-subtotal">$0</strong></div>
      <div style="display:flex;justify-content:space-between;font-size:16px;color:#a87f3e;margin-top:4px"><strong>TOTAL VENTA:</strong><strong id="vt-total">$0</strong></div>
      <div style="font-size:10px;color:#78716c;margin-top:4px">El despacho se registra aparte (no suma al total de venta)</div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-sec btn-sm" onclick="closeModal('modal-venta')">Cancelar</button>
      <button class="btn btn-danger btn-sm" id="del-venta-btn" onclick="delVenta()" style="display:none">Eliminar</button>
      <button class="btn btn-sm" onclick="saveVenta()">Guardar venta</button>
    </div>
  </div>
</div>

<!-- Modal Detalle Venta -->
<div class="modal-bg" id="modal-detalle">
  <div class="modal" style="max-width:500px">
    <h3>Detalle de venta</h3>
    <div id="det-content"></div>
    <div class="modal-actions">
      <button class="btn btn-sec btn-sm" onclick="closeModal('modal-detalle')">Cerrar</button>
      <button class="btn btn-sec btn-sm" id="pdf-venta-btn">📄 Descargar PDF</button>
      <button class="btn btn-sec btn-sm" id="print-venta-btn">🖨️ Imprimir</button>
      <button class="btn btn-sm" id="edit-venta-btn">Editar</button>
    </div>
  </div>
</div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getFirestore,collection,doc,getDocs,setDoc,deleteDoc,onSnapshot,writeBatch}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app=initializeApp({apiKey:"AIzaSyC9ApU52_dJTeDgp0M9jURItgv0kDlvVHc",authDomain:"dreamrest-erp.firebaseapp.com",projectId:"dreamrest-erp",storageBucket:"dreamrest-erp.firebasestorage.app",messagingSenderId:"317820280893",appId:"1:317820280893:web:66834520da9dc21cd80a54"});
const db=getFirestore(app);

async function saveProdDB(p){await setDoc(doc(db,'inventario',String(p.id)),p);}
async function delProdDB(id){await deleteDoc(doc(db,'inventario',String(id)));}
async function saveVentaDB(v){await setDoc(doc(db,'ventas',String(v.id)),v);}
async function delVentaDB(id){await deleteDoc(doc(db,'ventas',String(id)));}

// Exponemos al scope global para que los onclick del HTML puedan llamarlas
window.saveProdDB=saveProdDB;window.delProdDB=delProdDB;
window.saveVentaDB=saveVentaDB;window.delVentaDB=delVentaDB;
window.db=db;window.fsCollection=collection;window.fsDoc=doc;

// =========== DATOS DEFAULT ===========
// Inventario actualizado al cierre de abril 2026, ventas vacías para empezar mayo limpio

const INVENTARIO_DEFAULT = [
  // ==== DreamRest Soft ====

async function initFirebase(){
  document.getElementById('loading').style.display='flex';
  try{
    const invSnap=await getDocs(collection(db,'inventario'));
    if(invSnap.empty){
      const batch=writeBatch(db);
      INVENTARIO_DEFAULT.forEach(p=>batch.set(doc(db,'inventario',String(p.id)),p));
      await batch.commit();
      inventario=[...INVENTARIO_DEFAULT];
    }else{
      inventario=invSnap.docs.map(d=>d.data());

    const vtaSnap=await getDocs(collection(db,'ventas'));

      const batch=writeBatch(db);
      VENTAS_DEFAULT.forEach(v=>batch.set(doc(db,'ventas',String(v.id)),v));
      await batch.commit();
      ventas=[...VENTAS_DEFAULT];
    }else{
      ventas=vtaSnap.docs.map(d=>d.data()).filter(v=>!v.cliente.toLowerCase().includes('prueba'));
      const ids=new Set(ventas.map(v=>String(v.id)));
      const nuevas=VENTAS_DEFAULT.filter(v=>!ids.has(String(v.id)));
      if(nuevas.length){
        const batch=writeBatch(db);
        nuevas.forEach(v=>batch.set(doc(db,'ventas',String(v.id)),v));
        await batch.commit();
        ventas=[...ventas,...nuevas];
      }
    }
    onSnapshot(collection(db,'inventario'),snap=>{
      inventario=snap.docs.map(d=>d.data());
      renderInv();
    });
    onSnapshot(collection(db,'ventas'),snap=>{
      ventas=snap.docs.map(d=>d.data()).filter(v=>!v.cliente.toLowerCase().includes('prueba'));
      const tab=document.querySelector('.nav-btn.active');
      if(tab){const t=tab.getAttribute('onclick').match(/'(\w+)'/);if(t&&t[1]==='ventas')renderVentas();}
    });
  }catch(e){
    alert('Error conectando a Firebase: '+e.message);
    inventario=[...INVENTARIO_DEFAULT];
    ventas=[...VENTAS_DEFAULT];
  }
  document.getElementById('loading').style.display='none';
  renderInv();
  renderVentas();
}

function renderInv(){
  fillFiltrosInv();
  const q=document.getElementById('inv-search').value.toLowerCase();
  const fm=document.getElementById('inv-marca').value;
  const fc=document.getElementById('inv-cat').value;
  let items=inventario.filter(p=>{
    if(q&&!(p.nombre+' '+p.marca).toLowerCase().includes(q))return false;
    if(fm&&p.marca!==fm)return false;
    if(fc&&p.cat!==fc)return false;
    return true;
  });

  // Stats
  const totalUnidades=items.reduce((a,p)=>a+(parseInt(p.stock)||0),0);
  const valorMin=items.reduce((a,p)=>a+(parseInt(p.stock)||0)*(parseInt(p.min)||0),0);
  const sinStock=items.filter(p=>(parseInt(p.stock)||0)<=0).length;
  const bajoStock=items.filter(p=>{const s=parseInt(p.stock)||0;const m=parseInt(p.minStock)||2;return s>0&&s<=m}).length;

  document.getElementById('inv-stats').innerHTML=`
    <div class="stat"><div class="stat-lbl">Productos</div><div class="stat-val">${items.length}</div></div>
    <div class="stat"><div class="stat-lbl">Unidades totales</div><div class="stat-val">${totalUnidades}</div></div>
    <div class="stat"><div class="stat-lbl">Valor inventario</div><div class="stat-val" style="font-size:15px">${fmt(valorMin)}</div></div>
    <div class="stat"><div class="stat-lbl">Sin stock / Bajo</div><div class="stat-val warn" style="font-size:15px">${sinStock} / ${bajoStock}</div></div>`;

  if(!items.length){
    document.getElementById('inv-list').innerHTML='<div class="empty">No hay productos. Toca "+ Agregar producto" para empezar.</div>';
    return;
  }

  // Group by category
  const grupos={};
  items.forEach(p=>{const c=p.cat||'Sin categoría';if(!grupos[c])grupos[c]=[];grupos[c].push(p)});

  let html='';
  Object.keys(grupos).sort().forEach(cat=>{
    html+=`<h4 style="margin:12px 0 8px;font-size:13px;color:#57534e">${cat} <span class="pill">${grupos[cat].length}</span></h4>`;
    grupos[cat].sort((a,b)=>(a.marca||'').localeCompare(b.marca||'')||a.nombre.localeCompare(b.nombre)).forEach(p=>{
      const stock=parseInt(p.stock)||0;
      const minStock=parseInt(p.minStock)||2;
      const stockTag=stock<=0?'tag-stock-out':stock<=minStock?'tag-stock-low':'tag-stock-ok';
      const stockTxt=stock<=0?'Sin stock':stock<=minStock?`${stock} u (bajo)`:`${stock} u`;
      html+=`<div class="card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
          <div style="flex:1;cursor:pointer" onclick="editProd(${p.id})">
            <h4>${p.nombre}</h4>
            <div style="margin-top:3px"><span class="pill">${p.marca||'—'}</span> <span class="tag ${stockTag}">${stockTxt}</span></div>
            ${p.notas?`<div class="muted" style="font-size:11px;margin-top:4px;font-style:italic">${p.notas}</div>`:''}
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-size:11px;color:#a87f3e">May ${fmt(p.may||0)}</div>
            <div style="font-size:11px;color:#1e40af">Min ${fmt(p.min||0)}</div>
            <div style="margin-top:6px;display:flex;gap:4px;justify-content:flex-end">
              <button onclick="event.stopPropagation();editProd(${p.id})" style="padding:4px 8px;font-size:10px;background:#fff;color:#a87f3e;border:1px solid #a87f3e;border-radius:6px;cursor:pointer">✏️</button>
              <button onclick="event.stopPropagation();delProdDirect(${p.id})" style="padding:4px 8px;font-size:10px;background:#dc2626;color:#fff;border:none;border-radius:6px;cursor:pointer">🗑️</button>
            </div>
          </div>
        </div>
      </div>`;
    });
  });
  document.getElementById('inv-list').innerHTML=html;
}

    nombre,
    marca:document.getElementById('p-marca').value.trim(),

    min:parseInt(document.getElementById('p-min').value)||0,

async function saveVenta(){
  const cliente=document.getElementById('vt-cliente').value.trim();
  if(!cliente){alert('Falta el nombre del cliente');return}
  if(!ventaItems.length){alert('Agrega al menos un producto');return}

  const v={
    id:editVentaId||uid(),
    fecha:document.getElementById('vt-fecha').value||today(),
    fechaDesp:document.getElementById('vt-fecha-desp').value||document.getElementById('vt-fecha').value||today(),
    estado:document.getElementById('vt-estado').value||'pendiente',
    tipo:document.getElementById('vt-tipo').value,
    cliente,
    rut:document.getElementById('vt-rut').value.trim(),
    empresa:document.getElementById('vt-empresa').value.trim(),
    tel:document.getElementById('vt-tel').value.trim(),
    vendedor:document.getElementById('vt-vendedor').value,
    dir:document.getElementById('vt-dir').value.trim(),
    pago:document.getElementById('vt-pago').value,
    desp:parseInt(document.getElementById('vt-desp').value)||0,
    despCalle:document.getElementById('vt-calle').value.trim(),
    despNumero:document.getElementById('vt-numero').value.trim(),
    despComuna:document.getElementById('vt-comuna').value.trim(),
    despHora:document.getElementById('vt-hora').value,
    cancelado:parseInt(document.getElementById('vt-cancelado').value)||0,
    notas:document.getElementById('vt-notas').value.trim(),
    items:ventaItems.map(it=>({...it})),
  };
  v.subtotal=v.items.reduce((a,it)=>a+it.qty*it.precio,0);
  v.total=v.subtotal;
  v.saldo=Math.max(0,v.total-v.cancelado);

  // Descontar stock si es venta nueva
  if(!editVentaId){
    for(const it of v.items){
      if(it.prodId){
        const p=inventario.find(x=>x.id===it.prodId||x.id===String(it.prodId));
        if(p){p.stock=(parseInt(p.stock)||0)-it.qty;await saveProdDB(p);}
      }
    }
  }

  const esNueva=!editVentaId;
  if(editVentaId){
    const i=ventas.findIndex(x=>x.id===editVentaId||x.id===String(editVentaId));
    if(i>=0)ventas[i]=v;
  }else{
    ventas.push(v);
  }
  await saveVentaDB(v);
  closeModal('modal-venta');
  renderVentas();
  if(esNueva){window._autoPrint=true;setTimeout(()=>imprimirVenta(v.id),300);}
}

  let cy=y;
  clienteLines.forEach(([lbl,val])=>{
    if(!lbl&&!val){cy+=3;return;}
    doc.setFont('helvetica','normal');
    doc.setTextColor(...gray);
    doc.text(lbl,col2,cy);
    doc.setFont('helvetica','bold');
    doc.setTextColor(...dark);
    doc.text(val,col2+28,cy);
    cy+=5;
  });
  y=Math.max(y+30,cy)+4;

  // Dirección de despacho si aplica
  if(v.desp>0){
    const dir=[v.despCalle,v.despNumero,v.despComuna].filter(Boolean).join(', ')||v.dir||'';
    if(dir){
      doc.setFontSize(8);
      doc.setTextColor(...gray);
      doc.text('Dirección de despacho: ',M,y);
      doc.setTextColor(...dark);
      doc.setFont('helvetica','bold');
      doc.text(dir,M+38,y);
      doc.setFont('helvetica','normal');
      y+=5;
    }
    if(v.fechaDesp){
      doc.setTextColor(...gray);
      doc.text('Fecha despacho: ',M,y);
      doc.setTextColor(...gold);
      doc.setFont('helvetica','bold');
      doc.text(v.fechaDesp.split('-').reverse().join('/'),M+29,y);
      doc.setFont('helvetica','normal');
      y+=5;
    }
  }
  y+=3;

  // Tabla encabezado
  const colX=[M,M+90,M+115,M+145];
  const colW=[90,25,30,25];
  doc.setFillColor(...gold);
  doc.rect(M,y,W-2*M,8,'F');
  doc.setFontSize(8);
  doc.setFont('helvetica','bold');
  doc.setTextColor(255,255,255);
  doc.text('Descripción',colX[0]+2,y+5.5);
  doc.text('Cant.',colX[1]+2,y+5.5);
  doc.text('P. Unitario',colX[2]+2,y+5.5);
  doc.text('Total',colX[3]+2,y+5.5);
  y+=8;

  // Filas de productos
  const rowH=8;
  const fmtNum=n=>'$'+Math.round(n||0).toLocaleString('es-CL');
  v.items.forEach((it,i)=>{
    const nom=it.desc||((inventario.find(p=>p.id===it.prodId)||{}).nombre)||'Producto';
    doc.setFillColor(i%2===0?250:255,i%2===0?250:255,i%2===0?249:255);
    doc.rect(M,y,W-2*M,rowH,'F');
    doc.setFont('helvetica','normal');
    doc.setTextColor(...dark);
    doc.setFontSize(8);
    // Texto largo del producto con wrap
    const nomLines=doc.splitTextToSize(nom,86);
    doc.text(nomLines,colX[0]+2,y+5);
    doc.text(String(it.qty),colX[1]+2,y+5);
    doc.text(fmtNum(it.precio),colX[2]+2,y+5);
    doc.text(fmtNum(it.qty*it.precio),colX[3]+2,y+5);
    y+=nomLines.length>1?nomLines.length*5:rowH;
  });

  // Línea separadora y total
  doc.setDrawColor(...gold);
  doc.setLineWidth(0.5);
  doc.line(M,y,W-M,y);
  y+=6;
  doc.setFont('helvetica','bold');
  doc.setFontSize(10);
  doc.setTextColor(...gold);
  doc.text('TOTAL',colX[2],y);
  doc.text(fmtNum(v.total),colX[3]+2,y);

  if(v.desp>0){
    y+=6;
    doc.setFontSize(8);
    doc.setTextColor(...gray);
    doc.setFont('helvetica','normal');
    doc.text('Despacho (cobro aparte):',colX[2],y);
    doc.text(fmtNum(v.desp),colX[3]+2,y);
  }

  if(v.saldo>0){
    y+=7;
    doc.setFillColor(255,245,230);
    doc.rect(M,y-4,W-2*M,8,'F');
    doc.setFontSize(8);
    doc.setTextColor(146,64,14);
    doc.setFont('helvetica','bold');
    doc.text('Saldo pendiente: '+fmtNum(v.saldo)+' (Pagado: '+fmtNum(v.cancelado)+')',M+2,y+1);
    y+=8;
  }

  if(v.notas){
    y+=6;
    doc.setFontSize(8);
    doc.setFont('helvetica','italic');
    doc.setTextColor(...gray);
    const notasLines=doc.splitTextToSize('Nota: '+v.notas,W-2*M);
    doc.text(notasLines,M,y);
    y+=notasLines.length*5;
  }

  // Pie de página
  const pieY=277;
  doc.setDrawColor(...gold);
  doc.setLineWidth(0.8);
  doc.line(M,pieY,W-M,pieY);
  doc.setFontSize(7.5);
  doc.setFont('helvetica','normal');
  doc.setTextColor(...gray);
  doc.text('Agradecemos tu confianza. Es un placer colaborar contigo en este proyecto.',M,pieY+5);
  doc.text('El siguiente pedido se enviará dentro de 3 días hábiles, o en el plazo acordado con el vendedor.',M,pieY+9);
  doc.text('Atentamente, DreamRest.',M,pieY+13);

  // Guardar
  const nombre=v.cliente.replace(/\s+/g,'_');
  doc.save(`Pedido_DreamRest_${nombre}_${fechaFmt.replace(/\//g,'-')}.pdf`);
}

function descargarPedidoHTML(){
  if(!window._lastPedidoHtml){alert('Primero abre el pedido desde la lista de ventas.');return;}
  const blob=new Blob([window._lastPedidoHtml],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=window._lastPedidoNombre;
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},500);
}

async function delVenta(){
  if(!confirm('¿Eliminar esta venta? Esta acción no se puede deshacer.'))return;
  ventas=ventas.filter(v=>v.id!==editVentaId&&v.id!==String(editVentaId));
  await delVentaDB(editVentaId);
  closeModal('modal-venta');
  renderVentas();
}

function limpiarFiltrosVentas(){
  document.getElementById('v-search').value='';
  document.getElementById('v-tipo').value='';
  document.getElementById('v-desde').value='';
  document.getElementById('v-hasta').value='';
  document.getElementById('v-vendedor').value='';
  document.getElementById('v-pago').value='';
  document.getElementById('v-estado').value='';
  renderVentas();
}

function renderVentas(){
  const q=document.getElementById('v-search').value.toLowerCase();
  const ft=document.getElementById('v-tipo').value;
  const fDesde=document.getElementById('v-desde').value;
  const fHasta=document.getElementById('v-hasta').value;
  const fVend=document.getElementById('v-vendedor').value;
  const fPago=document.getElementById('v-pago').value;
  const fEstado=document.getElementById('v-estado').value;

  const hayFiltros=q||ft||fDesde||fHasta||fVend||fPago||fEstado;

  let items=ventas.filter(v=>{
    if(q&&!v.cliente.toLowerCase().includes(q))return false;
    if(ft&&v.tipo!==ft)return false;
    if(fDesde&&v.fecha<fDesde)return false;
    if(fHasta&&v.fecha>fHasta)return false;
    if(fVend&&v.vendedor!==fVend)return false;
    if(fPago&&v.pago!==fPago)return false;
    if(fEstado&&(v.estado||'pendiente')!==fEstado)return false;
    return true;
  }).sort((a,b)=>b.fecha.localeCompare(a.fecha));

  const base=hayFiltros?items:ventas;
  const totalGlobal=base.reduce((a,v)=>a+v.total,0);
  const saldoTotal=base.reduce((a,v)=>a+(v.saldo||0),0);
  const may=base.filter(v=>v.tipo==='may').reduce((a,v)=>a+v.total,0);
  const min=base.filter(v=>v.tipo==='min').reduce((a,v)=>a+v.total,0);
  const etiqueta=hayFiltros?'Ventas filtradas':'Total ventas';

  document.getElementById('v-stats').innerHTML=`
    <div class="stat"><div class="stat-lbl">${etiqueta}</div><div class="stat-val">${base.length}</div></div>
    <div class="stat"><div class="stat-lbl">Total facturado</div><div class="stat-val" style="font-size:15px">${fmt(totalGlobal)}</div></div>
    <div class="stat"><div class="stat-lbl">Mayorista</div><div class="stat-val may" style="font-size:15px">${fmt(may)}</div></div>
    <div class="stat"><div class="stat-lbl">Minorista</div><div class="stat-val min" style="font-size:15px">${fmt(min)}</div></div>
    ${saldoTotal>0?`<div class="stat"><div class="stat-lbl">Saldo pendiente</div><div class="stat-val warn" style="font-size:15px">${fmt(saldoTotal)}</div></div>`:''}`;

  if(!items.length){
    document.getElementById('v-list').innerHTML=`<div class="empty">${hayFiltros?'No hay ventas con esos filtros.':'No hay ventas registradas. Toca "+ Nueva venta" para empezar.'}</div>`;
    return;
  }

  document.getElementById('v-list').innerHTML=items.map(v=>{
    const est=v.estado||'pendiente';
    const cfg=ESTADO_CFG[est]||ESTADO_CFG.pendiente;
    return`<div class="card" onclick="viewVenta(${v.id})" style="cursor:pointer;border-left:3px solid ${cfg.bg}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
        <div style="flex:1;min-width:0">
          <h4 style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${v.cliente}</h4>
          <div style="margin-top:3px;font-size:11px;color:#78716c">
            <span class="tag ${v.tipo==='may'?'tag-may':'tag-min'}">${v.tipo==='may'?'May':'Min'}</span>
            ${estadoTag(est)}
            ${v.fecha.split('-').reverse().join('/')} · ${v.vendedor||'—'}
          </div>
          ${v.desp>0&&v.fechaDesp?`<div style="font-size:11px;color:#a87f3e;margin-top:2px">🚚 Despacho: <strong>${v.fechaDesp.split('-').reverse().join('/')}</strong> ${v.despHora&&v.despHora!=='Sin preferencia'?'· '+v.despHora:''}</div>`:''}
          ${v.saldo>0?`<div class="warn" style="font-size:11px;margin-top:3px">⚠ Saldo pendiente ${fmt(v.saldo)}</div>`:''}
          ${v.notas?`<div class="muted" style="font-size:11px;margin-top:3px;font-style:italic">${v.notas.length>60?v.notas.slice(0,60)+'...':v.notas}</div>`:''}
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-weight:600;color:#a87f3e">${fmt(v.total)}</div>
          <div style="font-size:10px;color:#78716c">${v.items.length} ítem${v.items.length!==1?'s':''}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// =========== DESPACHOS ===========
function renderDespachos(){
  const fEstado=document.getElementById('d-estado').value;
  const fFecha=document.getElementById('d-fecha').value;

  // Solo ventas con despacho (desp > 0) y que no estén canceladas
  let items=ventas.filter(v=>{
    if(!v.desp||v.desp<=0)return false;
    if((v.estado||'pendiente')==='cancelado')return false;
    if(fEstado&&(v.estado||'pendiente')!==fEstado)return false;
    if(fFecha&&v.fechaDesp!==fFecha)return false;
    return true;
  }).sort((a,b)=>(a.fechaDesp||a.fecha).localeCompare(b.fechaDesp||b.fecha));

  if(!items.length){
    document.getElementById('d-list').innerHTML='<div class="empty">No hay despachos pendientes con esos filtros.</div>';
    return;
  }

  // Agrupar por fecha de despacho
  const grupos={};
  items.forEach(v=>{
    const k=v.fechaDesp||v.fecha;
    if(!grupos[k])grupos[k]=[];
    grupos[k].push(v);
  });

  const hoy=today();
  let html='';
  Object.keys(grupos).sort().forEach(fecha=>{
    const d=new Date(fecha+'T12:00:00');
    const diasDiff=Math.round((d-new Date(hoy+'T12:00:00'))/(1000*60*60*24));
    let labelDia='';
    if(diasDiff===0)labelDia=' <span style="background:#fef3c7;color:#92400e;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600">HOY</span>';
    else if(diasDiff===1)labelDia=' <span style="background:#dbeafe;color:#1e40af;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600">MAÑANA</span>';
    else if(diasDiff<0)labelDia=' <span style="background:#fee2e2;color:#991b1b;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600">ATRASADO</span>';

    html+=`<h4 style="margin:12px 0 8px;font-size:13px;color:#57534e">${fecha.split('-').reverse().join('/')}${labelDia} <span class="pill">${grupos[fecha].length} despacho${grupos[fecha].length!==1?'s':''}</span></h4>`;
    grupos[fecha].forEach(v=>{
      const est=v.estado||'pendiente';
      const dir=[v.despCalle,v.despNumero,v.despComuna].filter(Boolean).join(', ')||v.dir||'Sin dirección';
      html+=`<div class="card" onclick="viewVenta(${v.id})" style="cursor:pointer">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
          <div style="flex:1">
            <h4>${v.cliente}</h4>
            <div style="font-size:11px;color:#78716c;margin-top:2px">📍 ${dir}</div>
            ${v.despHora&&v.despHora!=='Sin preferencia'?`<div style="font-size:11px;color:#a87f3e;margin-top:2px">⏰ ${v.despHora}</div>`:''}
            ${v.tel?`<div style="font-size:11px;color:#78716c;margin-top:2px">📞 +56 9 ${v.tel}</div>`:''}
            <div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap;align-items:center">
              ${estadoTag(est)}
              <button onclick="event.stopPropagation();cambiarEstado(${v.id},'despachado')" style="font-size:10px;padding:3px 8px;background:#dcfce7;color:#166534;border:1px solid #166534;border-radius:6px;cursor:pointer">✓ Marcar despachado</button>
            </div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-weight:600;color:#a87f3e">${fmt(v.total)}</div>
            <div style="font-size:10px;color:#78716c">Desp. ${fmt(v.desp)}</div>
          </div>
        </div>
      </div>`;
    });
  });

  document.getElementById('d-list').innerHTML=html;
}

function cambiarEstado(id,nuevoEstado){
  const v=ventas.find(x=>x.id===id||x.id===String(id));
  if(!v)return;
  v.estado=nuevoEstado;
  saveVentaDB(v);
  renderDespachos();
}


// =========== RESUMEN ===========
function fillResumenSelects(){
  const anios=[...new Set(ventas.map(v=>v.fecha.slice(0,4)))].sort((a,b)=>b-a);
  const cur=new Date();
  if(!anios.includes(String(cur.getFullYear())))anios.unshift(String(cur.getFullYear()));
  const sa=document.getElementById('r-anio');
  const sm=document.getElementById('r-mes');
  if(!sa.options.length){
    sa.innerHTML=anios.map(a=>`<option value="${a}" ${a==cur.getFullYear()?'selected':''}>${a}</option>`).join('');
    sm.innerHTML='<option value="">Todo el año</option>'+MESES.map((m,i)=>`<option value="${i}" ${i===cur.getMonth()?'selected':''}>${m}</option>`).join('');
  }
}

function renderResumen(){
  fillResumenSelects();
  const anio=parseInt(document.getElementById('r-anio').value);
  const mesV=document.getElementById('r-mes').value;
  const mes=mesV===''?null:parseInt(mesV);

  const items=ventas.filter(v=>{
    const d=new Date(v.fecha);
    if(d.getFullYear()!==anio)return false;
    if(mes!==null&&d.getMonth()!==mes)return false;
    return true;
  });

  const total=items.reduce((a,v)=>a+v.total,0);
  const may=items.filter(v=>v.tipo==='may').reduce((a,v)=>a+v.total,0);
  const min=items.filter(v=>v.tipo==='min').reduce((a,v)=>a+v.total,0);
  const saldo=items.reduce((a,v)=>a+(v.saldo||0),0);

  document.getElementById('r-stats').innerHTML=`
    <div class="stat"><div class="stat-lbl">Ventas del período</div><div class="stat-val">${items.length}</div></div>
    <div class="stat"><div class="stat-lbl">Total</div><div class="stat-val" style="font-size:15px">${fmt(total)}</div></div>
    <div class="stat"><div class="stat-lbl">Mayorista</div><div class="stat-val may" style="font-size:15px">${fmt(may)}</div></div>
    <div class="stat"><div class="stat-lbl">Minorista</div><div class="stat-val min" style="font-size:15px">${fmt(min)}</div></div>
    ${saldo>0?`<div class="stat"><div class="stat-lbl">Saldo pendiente</div><div class="stat-val warn" style="font-size:15px">${fmt(saldo)}</div></div>`:''}`;

  // Charts
  let charts='';

  if(mes===null){
    // Por mes del año
    const porMes=MESES.map((m,i)=>{
      const mr=items.filter(v=>new Date(v.fecha).getMonth()===i);
      return{label:m,val:mr.reduce((a,v)=>a+v.total,0),count:mr.length};
    });
    const max=Math.max(...porMes.map(m=>m.val),1);
    charts+=`<div class="card"><h4 style="margin-bottom:10px">Ventas por mes — ${anio}</h4>${porMes.map(m=>m.val>0?`
      <div class="bar-row">
        <div class="bar-lbl"><span>${m.label}</span><span><strong>${fmt(m.val)}</strong> <span class="muted">(${m.count})</span></span></div>
        <div class="bar"><div class="bar-fill" style="width:${m.val/max*100}%"></div></div>
      </div>`:'').join('')||'<div class="empty">Sin ventas</div>'}</div>`;
  }else{
    // Por día del mes
    const porDia={};
    items.forEach(v=>{
      const d=v.fecha;
      if(!porDia[d])porDia[d]={val:0,count:0};
      porDia[d].val+=v.total;porDia[d].count++;
    });
    const dias=Object.entries(porDia).sort((a,b)=>a[0].localeCompare(b[0]));
    const max=Math.max(...dias.map(d=>d[1].val),1);
    charts+=`<div class="card"><h4 style="margin-bottom:10px">Ventas por día</h4>${dias.length?dias.map(([d,v])=>`
      <div class="bar-row">
        <div class="bar-lbl"><span>${d.split('-').reverse().join('/')}</span><span><strong>${fmt(v.val)}</strong> <span class="muted">(${v.count})</span></span></div>
        <div class="bar"><div class="bar-fill" style="width:${v.val/max*100}%"></div></div>
      </div>`).join(''):'<div class="empty">Sin ventas</div>'}</div>`;
  }

  // Por vendedor
  const vends={};
  items.forEach(v=>{
    const k=v.vendedor||'Sin asignar';
    if(!vends[k])vends[k]={val:0,count:0};
    vends[k].val+=v.total;vends[k].count++;
  });
  if(Object.keys(vends).length){
    const maxV=Math.max(...Object.values(vends).map(v=>v.val),1);
    charts+=`<div class="card"><h4 style="margin-bottom:10px">Por vendedor</h4>${Object.entries(vends).sort((a,b)=>b[1].val-a[1].val).map(([k,v])=>`
      <div class="bar-row">
        <div class="bar-lbl"><span>${k}</span><span><strong>${fmt(v.val)}</strong> <span class="muted">(${v.count})</span></span></div>
        <div class="bar"><div class="bar-fill" style="width:${v.val/maxV*100}%"></div></div>
      </div>`).join('')}</div>`;
  }

  // Top clientes
  const cli={};
  items.forEach(v=>{
    if(!cli[v.cliente])cli[v.cliente]={val:0,count:0};
    cli[v.cliente].val+=v.total;cli[v.cliente].count++;
  });
  const top=Object.entries(cli).sort((a,b)=>b[1].val-a[1].val).slice(0,10);
  if(top.length){
    const maxC=top[0][1].val;
    charts+=`<div class="card"><h4 style="margin-bottom:10px">Top 10 clientes</h4>${top.map(([k,v])=>`
      <div class="bar-row">
        <div class="bar-lbl"><span>${k}</span><span><strong>${fmt(v.val)}</strong> <span class="muted">(${v.count})</span></span></div>
        <div class="bar"><div class="bar-fill" style="width:${v.val/maxC*100}%"></div></div>
      </div>`).join('')}</div>`;
  }

  document.getElementById('r-charts').innerHTML=charts;
  document.getElementById('r-tabla').innerHTML='';
}

// =========== EXPORT ===========
function exportInv(){
  const csv=['Marca,Categoría,Producto,Mayorista,Minorista,Stock,Stock mínimo'];
  inventario.forEach(p=>csv.push(`"${p.marca||''}","${p.cat||''}","${p.nombre.replace(/"/g,'""')}",${p.may||0},${p.min||0},${p.stock||0},${p.minStock||0}`));
  downloadCSV('inventario_dreamrest_'+today()+'.csv',csv.join('\n'));
}

function exportVentas(){
  const csv=['Fecha,Cliente,Tipo,Vendedor,Pago,Productos,Subtotal,Despacho,Total venta,Pagado,Saldo,Notas'];
  ventas.forEach(v=>{
    const prods=v.items.map(it=>`${it.qty}x ${it.desc||(inventario.find(p=>p.id===it.prodId)||{}).nombre||'?'}`).join('; ');
    csv.push(`${v.fecha},"${v.cliente.replace(/"/g,'""')}",${v.tipo==='may'?'Mayorista':'Minorista'},"${v.vendedor||''}",${v.pago||''},"${prods.replace(/"/g,'""')}",${v.subtotal},${v.desp||0},${v.total},${v.cancelado||0},${v.saldo||0},"${(v.notas||'').replace(/"/g,'""')}"`);
  });
  downloadCSV('ventas_dreamrest_'+today()+'.csv',csv.join('\n'));
}

function downloadCSV(name,content){
  // Usar data URI en vez de createObjectURL para compatibilidad con archivos locales
  const encoded='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(content);
  const a=document.createElement('a');
  a.href=encoded;
  a.download=name;
  a.style.display='none';
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>document.body.removeChild(a),200);
}

});
